services:
  - type: web
    name: overlooked-founders-api
    runtime: python
    rootDir: services/feedback-pipeline
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONPATH
        value: /opt/render/project/src/services/feedback-pipeline:/opt/render/project/src
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PIPELINE_API_KEY
        sync: false
